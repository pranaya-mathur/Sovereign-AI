{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  jwt-secret-key: {{ .Values.secrets.jwtSecretKey | quote }}
  sovereign-api-key: {{ .Values.secrets.sovereignApiKey | quote }}
  groq-api-key: {{ .Values.secrets.groqApiKey | quote }}
  redis-url: {{ .Values.secrets.redisUrl | quote }}
{{- end }}
