name: Nightly Red-Team Suite

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  redteam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run red-team harness
        env:
          SOVEREIGN_REDTEAM_API_URL: ${{ secrets.SOVEREIGN_REDTEAM_API_URL }}
          SOVEREIGN_API_KEY: ${{ secrets.SOVEREIGN_API_KEY }}
          SOVEREIGN_REDTEAM_REPORT: tests/redteam/redteam_report.json
        run: |
          python -m tests.redteam.redteam_harness
          pytest -q tests/redteam/test_redteam.py

      - name: Upload compliance report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-compliance-report
          path: tests/redteam/redteam_report.json
