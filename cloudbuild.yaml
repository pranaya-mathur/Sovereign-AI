steps:
# 1. Run Unit & Integration Tests
- name: 'python:3.11-slim'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    pip install -r requirements.txt
    pytest tests/ -v -m "not integration" --maxfail=3

# 2. Build & Push API
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-pilot:$COMMIT_SHA', 
    '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-pilot:latest',
    '-f', 'Dockerfile',
    '.'
  ]
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-pilot', '--all-tags']

# 3. Build & Push Dashboard
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-dashboard:$COMMIT_SHA', 
    '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-dashboard:latest',
    '-f', 'Dockerfile.dashboard',
    '.'
  ]
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-dashboard', '--all-tags']

# 4. Deploy API to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'sovereign-ai-pilot'
  - '--image'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-pilot:$COMMIT_SHA'
  - '--region'
  - 'asia-south1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

# 5. Deploy Dashboard to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'sovereign-ai-dashboard'
  - '--image'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/sovereign-artifacts/sovereign-ai-dashboard:$COMMIT_SHA'
  - '--region'
  - 'asia-south1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
