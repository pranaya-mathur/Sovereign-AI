apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-obs-config
data:
  policy.yaml: |
    # LLM Observability Policy Configuration
    version: "1.0.0"
    
    global:
      default_action: "log"
      strict_mode: false
      
    failure_policies:
      fabricated_concept:
        severity: "critical"
        action: "block"
        reason: "Hallucinated terms/concepts pose safety risk"
      fabricated_fact:
        severity: "critical"
        action: "block"
        reason: "False information stated as fact is dangerous"
      dangerous_content:
        severity: "critical"
        action: "block"
        reason: "Content violates safety guidelines"
      prompt_injection:
        severity: "critical"
        action: "block"
        reason: "Security threat - potential system compromise or manipulation"
      toxicity:
        severity: "critical"
        action: "block"
        reason: "Hate speech, slurs, or offensive language detected"
      missing_grounding:
        severity: "high"
        action: "warn"
        reason: "Unverified claims require user awareness"
      domain_mismatch:
        severity: "high"
        action: "warn"
        reason: "Response discusses wrong topic or context"
      bias:
        severity: "high"
        action: "warn"
        reason: "Stereotyping or discriminatory language detected"
      overconfidence:
        severity: "medium"
        action: "warn"
        reason: "Excessive certainty without justification"
      hedging_excessive:
        severity: "medium"
        action: "warn"
        reason: "Too much hedging reduces response utility"
      tone_issue:
        severity: "low"
        action: "log"
        reason: "Monitor tone patterns for quality improvement"
      formatting_issue:
        severity: "low"
        action: "log"
        reason: "Track formatting problems for model tuning"

    thresholds:
      critical: 0.15
      high: 0.10
      medium: 0.08
      low: 0.05
      tier1_cutoff: 0.80
      tier2_cutoff: 0.15
      uncertain_default: 0.95

    messages:
      block: "⛔ Response blocked: {reason}"
      warn: "⚠️ Warning: {reason}"
      log: "ℹ️ Note: {reason}"

    observability:
      enabled: true
      service_name: "sovereign-ai-guard"
      otlp_endpoint: "http://localhost:4317"
      sampling_rate: 1.0
      export_timeout_seconds: 10

    llm_providers:
      groq_model: "llama-3.3-70b-versatile"
      ollama_model: "qwen3.5:9b"
      ollama_base_url: "http://ollama-service:11434"

